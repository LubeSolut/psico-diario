<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(id) {
  const c = document.getElementById(id);
  const size = c.width;
  const ctx = c.getContext('2d');
  const r = size * 0.18;
  ctx.fillStyle = '#6366f1';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📓', size/2, size/2);
}
drawIcon('c192');
drawIcon('c512');

const a192 = document.createElement('a');
a192.download = 'icon-192.png';
a192.href = document.getElementById('c192').toDataURL();
a192.textContent = 'Download 192';
document.body.appendChild(a192);

const a512 = document.createElement('a');
a512.download = 'icon-512.png';
a512.href = document.getElementById('c512').toDataURL();
a512.textContent = ' | Download 512';
document.body.appendChild(a512);
</script>
</body>
</html>
